name: Sync upstream docs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run generate:refresh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet upstream-cache/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get upstream version
        if: steps.diff.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/panva/node-oidc-provider/tags | jq -r '.[0].name')
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: upstream-sync/auto
          commit-message: 'docs: sync with upstream ${{ steps.version.outputs.tag }}'
          title: 'docs: sync with upstream ${{ steps.version.outputs.tag }}'
          body: |
            Automated sync of upstream documentation from [panva/node-oidc-provider](https://github.com/panva/node-oidc-provider).

            Updated upstream cache files detected. Review and merge to update the site.
          add-paths: |
            upstream-cache/*
