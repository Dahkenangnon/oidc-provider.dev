<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" fill="none">
  <style>
    .line { stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .node-ring { stroke: currentColor; stroke-width: 2; fill: none; }
    .node-fill { fill: currentColor; opacity: 0.08; }
    .icon { fill: currentColor; opacity: 0.7; }
    .label { fill: currentColor; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; opacity: 0.6; text-anchor: middle; }
    .token { fill: currentColor; opacity: 0.25; }
    .dot { fill: currentColor; opacity: 0.2; }
  </style>

  <!-- Connection lines -->
  <line x1="148" y1="160" x2="372" y2="160" class="line" stroke-dasharray="6 4" />
  <line x1="260" y1="62" x2="148" y2="160" class="line" stroke-dasharray="6 4" />
  <line x1="260" y1="62" x2="372" y2="160" class="line" stroke-dasharray="6 4" />

  <!-- Token symbols on lines -->
  <circle cx="200" cy="110" r="4" class="token" />
  <circle cx="320" cy="110" r="4" class="token" />
  <rect x="254" y="156" width="12" height="8" rx="2" class="token" />

  <!-- Flow dots -->
  <circle cx="175" cy="135" r="2.5" class="dot" />
  <circle cx="225" cy="95" r="2.5" class="dot" />
  <circle cx="295" cy="95" r="2.5" class="dot" />
  <circle cx="345" cy="135" r="2.5" class="dot" />
  <circle cx="220" cy="160" r="2.5" class="dot" />
  <circle cx="300" cy="160" r="2.5" class="dot" />

  <!-- User node (top center) -->
  <circle cx="260" cy="48" r="38" class="node-fill" />
  <circle cx="260" cy="48" r="38" class="node-ring" />
  <!-- Person icon -->
  <circle cx="260" cy="38" r="9" class="icon" />
  <path d="M244 58 a16 14 0 0 1 32 0" class="icon" />
  <text x="260" y="100" class="label">User</text>

  <!-- Provider node (left) -->
  <circle cx="120" cy="180" r="44" class="node-fill" />
  <circle cx="120" cy="180" r="44" class="node-ring" />
  <!-- Shield icon -->
  <path d="M120 162 l14 6 v10 c0 8-5 16-14 20 c-9-4-14-12-14-20 v-10 z" class="icon" />
  <text x="120" y="240" class="label">Provider</text>

  <!-- Client node (right) -->
  <circle cx="400" cy="180" r="44" class="node-fill" />
  <circle cx="400" cy="180" r="44" class="node-ring" />
  <!-- Window icon -->
  <rect x="383" y="168" width="34" height="24" rx="3" class="icon" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.7" />
  <line x1="383" y1="175" x2="417" y2="175" stroke="currentColor" stroke-width="1.5" opacity="0.7" />
  <circle cx="388" cy="172" r="1.5" class="icon" />
  <circle cx="393" cy="172" r="1.5" class="icon" />
  <text x="400" y="240" class="label">Client</text>

  <!-- Decorative: small key symbol near provider line -->
  <g transform="translate(178, 158) rotate(-15)" opacity="0.2">
    <circle cx="0" cy="0" r="4" stroke="currentColor" stroke-width="1.5" fill="none" />
    <line x1="4" y1="0" x2="12" y2="0" stroke="currentColor" stroke-width="1.5" />
    <line x1="10" y1="0" x2="10" y2="3" stroke="currentColor" stroke-width="1.5" />
  </g>

  <!-- Decorative: small lock symbol near client line -->
  <g transform="translate(340, 158)" opacity="0.2">
    <rect x="-4" y="0" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" />
    <path d="M-2 0 v-3 a2 2 0 0 1 4 0 v3" stroke="currentColor" stroke-width="1.5" fill="none" />
  </g>

  <!-- Outer decorative dots -->
  <circle cx="40" cy="100" r="3" class="dot" />
  <circle cx="480" cy="100" r="3" class="dot" />
  <circle cx="60" cy="280" r="3" class="dot" />
  <circle cx="460" cy="280" r="3" class="dot" />
  <circle cx="260" cy="290" r="3" class="dot" />
</svg>
